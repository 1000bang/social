spring:
  config:
    import: "optional:classpath:application-local.yml"
  application:
    name: mySocial
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/mysocial}
    username: ${DB_USERNAME:mysocial}
    password: ${DB_PASSWORD:mysocial}
  jpa:
    hibernate:
      # 마이그레이션 도구(Flyway/Liquibase) 도입 전까지 로컬 개발 편의상 update 사용. 운영 전환 시 validate + 마이그레이션 스크립트로 교체할 것
      ddl-auto: update
    open-in-view: false
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

server:
  port: 8080

app:
  token:
    encryption-key: ${TOKEN_ENCRYPTION_KEY:EnV4fl1ammSVUVEoAiHofXTVtOg3GdV29vmqhnlgwI8=}
  webhook:
    verify-token: ${WEBHOOK_VERIFY_TOKEN:changeme}
    app-secret: ${WEBHOOK_APP_SECRET:changeme}
  meta:
    # 실제 값은 application-local.yml(gitignore 처리됨)에서 주입
    app-id: ${META_APP_ID:}
    app-secret: ${META_APP_SECRET:}
    redirect-uri: ${META_REDIRECT_URI:https://social.1000bang.info/api/auth/instagram/callback}
    oauth-scopes: ${META_OAUTH_SCOPES:instagram_business_basic,instagram_business_manage_comments,instagram_business_manage_messages}
    web-auth-callback-url: ${WEB_AUTH_CALLBACK_URL:https://social.1000bang.info/auth/callback}
  auth:
    # 실제 값은 application-local.yml(gitignore 처리됨)에서 주입. 운영에서는 반드시 JWT_SECRET 환경변수로 재설정할 것
    jwt-secret: ${JWT_SECRET:ItPOW+F++JPIqidD9aUYtAaoaLmoy7AwLZMZVTxSIXci5WtTiiR67rpBntnwnCEe}
    jwt-expiration-days: ${JWT_EXPIRATION_DAYS:30}
  server:
    public-base-url: ${PUBLIC_BASE_URL:https://social.1000bang.info}
