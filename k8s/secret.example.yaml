# 실제 값을 채운 뒤 파일명을 secret.yaml로 바꿔서 kubectl apply -f 로 직접 적용할 것.
# secret.yaml은 git에 커밋하지 말 것 (.gitignore 처리됨), ArgoCD도 secret.example.yaml은 sync 대상에서 제외됨.
apiVersion: v1
kind: Secret
metadata:
  name: social-api-secret
  namespace: default
type: Opaque
stringData:
  DB_USERNAME: "CHANGE_ME"
  DB_PASSWORD: "CHANGE_ME"
  TOKEN_ENCRYPTION_KEY: "CHANGE_ME_BASE64_32BYTES"
  WEBHOOK_VERIFY_TOKEN: "CHANGE_ME"
  WEBHOOK_APP_SECRET: "CHANGE_ME"
  META_APP_ID: "CHANGE_ME"
  META_APP_SECRET: "CHANGE_ME"
